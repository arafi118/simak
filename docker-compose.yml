version: "3"

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - .:/var/www/html
        networks:
            - akubumdes-network

    nginx:
        image: nginx:alpine
        ports:
            - "${APP_PORT:-8001}:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app
        networks:
            - akubumdes-network

networks:
    akubumdes-network:
        driver: bridge
